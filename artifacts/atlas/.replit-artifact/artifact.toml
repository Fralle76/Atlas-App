kind = "web"
previewPath = "/"
title = "Atlas"
version = "1.0.0"
id = "artifacts/atlas"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20388
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/atlas run dev"

[services.env]
PORT = "20388"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/atlas", "run", "build"]
publicDir = "artifacts/atlas/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
